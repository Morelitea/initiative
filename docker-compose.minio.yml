# MinIO overlay — run the app against a self-hosted, S3-compatible object store
# instead of the local filesystem. This is the same code path the cloud uses
# against AWS S3 (STORAGE_BACKEND=s3); only the endpoint/credentials differ.
#
#   docker compose -f docker-compose.yml -f docker-compose.minio.yml up --build
#
# MinIO console: http://localhost:9001  (login with the root creds below).
# Override the defaults with MINIO_ROOT_USER / MINIO_ROOT_PASSWORD / S3_BUCKET.
services:
  minio:
    image: minio/minio:latest
    container_name: initiative-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: create the bucket (and enable versioning, matching the cloud
  # baseline) once MinIO is up, then exit.
  minio-init:
    image: minio/mc:latest
    container_name: initiative-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-initiative} &&
      mc version enable local/${S3_BUCKET:-initiative} &&
      echo 'MinIO bucket ready: ${S3_BUCKET:-initiative}'
      "
    restart: "no"

  initiative:
    environment:
      STORAGE_BACKEND: s3
      S3_BUCKET: ${S3_BUCKET:-initiative}
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_USE_PATH_STYLE: "true"
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  minio_data:
    driver: local
