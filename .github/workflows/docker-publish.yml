name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.30.0) — sets Docker semver tags'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/initiative

jobs:
  decide:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build_android: ${{ steps.decide.outputs.build_android }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether to build the native app
        id: decide
        run: |
          # The Android/iOS app only needs rebuilding when the native shell changed — which
          # promote.sh records by moving MIN_NATIVE_VERSION forward. Compare this ref's value
          # against the previous release tag; web-only releases reuse the existing APK and
          # update over the air. The committed file is the single source of truth, so both the
          # workflow_dispatch and manual tag-push paths behave identically.
          cur=$(cat MIN_NATIVE_VERSION 2>/dev/null || echo "")
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$prev" ]; then
            old=$(git show "$prev:MIN_NATIVE_VERSION" 2>/dev/null || echo "")
          else
            old=""
          fi
          if [ -z "$old" ] || [ "$old" != "$cur" ]; then
            echo "build_android=true" >> "$GITHUB_OUTPUT"
            echo "Native min-version changed ('$old' -> '$cur') or no prior value — building the app."
          else
            echo "build_android=false" >> "$GITHUB_OUTPUT"
            echo "Native min-version unchanged ('$cur') — web-only release, skipping the app build."
          fi

  build-android:
    needs: decide
    if: ${{ needs.decide.outputs.build_android == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(cat VERSION)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend for Capacitor
        working-directory: frontend
        run: pnpm build:capacitor

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Decode keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        working-directory: frontend/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build signed APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        working-directory: frontend/android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build unsigned APK (fallback)
        if: ${{ env.HAS_KEYSTORE != 'true' }}
        working-directory: frontend/android
        run: ./gradlew assembleRelease

      - name: Rename APK with version
        run: |
          mkdir -p artifacts
          if [ -f frontend/android/app/build/outputs/apk/release/app-release.apk ]; then
            cp frontend/android/app/build/outputs/apk/release/app-release.apk artifacts/initiative-${{ steps.version.outputs.version }}.apk
          else
            cp frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk artifacts/initiative-${{ steps.version.outputs.version }}-unsigned.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: artifacts/*.apk

  build-docker-public:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for required secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Required secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are not set"
            echo "::error::Please configure these secrets in your repository settings"
            echo "::error::See .github/DOCKER_SETUP.md for instructions"
            exit 1
          fi
          echo "Required secrets are configured"

      - name: Extract version from tag
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Version from input: $VERSION"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Version from tag: $VERSION"
          else
            VERSION=$(cat VERSION)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Version from file: $VERSION"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            VITE_API_URL=/api/v1
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=docker-build-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-release-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-docker-public:
    needs: build-docker-public
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-release-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}${{ inputs.version && format(',value=v{0}', inputs.version) || '' }}
            type=semver,pattern={{major}}.{{minor}}${{ inputs.version && format(',value=v{0}', inputs.version) || '' }}
            type=semver,pattern={{major}}${{ inputs.version && format(',value=v{0}', inputs.version) || '' }}
            type=raw,value=latest

      - name: Create and push manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        if: steps.meta.outputs.version != ''
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  release:
    needs: [decide, build-android, merge-docker-public]
    # Run even when build-android was *skipped* (web-only release). Only the Docker manifest
    # must have succeeded; the APK is attached opportunistically below. But a build-android
    # *failure* on a native-change release is a hard error — publishing then would advertise
    # "updates over the air" while the bumped minNativeVersion blocks OTA and no new APK exists.
    if: always() && needs.merge-docker-public.result == 'success' && needs.build-android.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Sync the Docker Hub repository overview from docs/DOCKERHUB.md so the published
      # description stays in version control. The description-update API needs a token with
      # write scope (or the account password); if this 401s, widen DOCKERHUB_TOKEN's scope.
      - name: Update Docker Hub description
        if: startsWith(github.ref, 'refs/tags/')
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "Self-hosted project management for friend groups, gaming communities, and small teams"
          readme-filepath: ./docs/DOCKERHUB.md

      - name: Download Android APK
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: artifacts

      - name: Extract version from tag
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(cat VERSION)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog for version
        id: changelog
        if: startsWith(github.ref, 'refs/tags/')
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          APK_BUILT: ${{ needs.build-android.result == 'success' }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Extracting changelog for version $VERSION"

          # Extract the section for this version from CHANGELOG.md
          # Matches ## [X.Y.Z] and captures until the next ## [ or end of file
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") || index($0, "[v" ver "]")) {
                found = 1
                next
              }
            }
            found { print }
          ' CHANGELOG.md)

          # If no version-specific section found, provide fallback
          if [ -z "$CHANGELOG" ]; then
            echo "No changelog section found for version $VERSION"
            CHANGELOG="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi

          # The native app is only rebuilt when the native shell changed (see the `decide`
          # job). Web-only releases ship no new APK — existing installs update over the air.
          if [ "$APK_BUILT" = "true" ]; then
            ANDROID_SECTION="### Android App
          Download the APK from the assets below and install on your Android device."
          else
            ANDROID_SECTION="### Android App
          No new app build this release — installed apps update automatically over the air on next launch."
          fi

          # Build full release body with changelog + download info
          cat > release_body.md << ENDOFBODY
          $CHANGELOG

          ---

          ## Downloads

          $ANDROID_SECTION

          ### Docker Image
          \`\`\`bash
          docker pull ${IMAGE_NAME}:${VERSION}
          \`\`\`

          Or use \`latest\` tag. View on [Docker Hub](https://hub.docker.com/r/${DOCKERHUB_USERNAME}/initiative).
          ENDOFBODY

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' release_body.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.apk
          body_path: release_body.md
          draft: false
          prerelease: false

      - name: Discord Webhook Action
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          content: ":tada: Initiative ${{ steps.version.outputs.version }} has been published! Download the apk from the [GitHub Release](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}) or pull the Docker image with tag `${{ steps.version.outputs.version }}` from Docker Hub."
