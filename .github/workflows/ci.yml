name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: initiative
          POSTGRES_PASSWORD: initiative
          POSTGRES_DB: initiative_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U initiative"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://initiative:initiative@localhost:5432/initiative_test
      DATABASE_URL_APP: postgresql+asyncpg://app_user:app_user@localhost:5432/initiative_test
      DATABASE_URL_ADMIN: postgresql+asyncpg://app_admin:app_admin@localhost:5432/initiative_test
      # Fixed test-only key (64 hex chars). Not a secret: CI databases are ephemeral.
      SECRET_KEY: 3b9c63094f48ae5b21e23a9d6d34a8e6f1f1f24cb0a44c84a25e36c9d4a7f1d2
      AUTO_APPROVED_EMAIL_DOMAINS: '["example.com"]'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for backend changes
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- backend/ || true)
          else
            CHANGED=$(git diff --name-only HEAD~1...HEAD -- backend/ || true)
          fi

          if [[ -z "$CHANGED" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No backend changes — skipping"
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT

          # Migration tests are slow (real upgrade/downgrade against
          # Postgres) and only relevant when the alembic/ folder itself
          # changes. Track them as a separate scope token so they're only
          # appended when needed. Also expose a flag so we can skip the
          # explicit `alembic upgrade head` step on non-alembic PRs —
          # conftest.py already runs migrations as a pytest fixture, so
          # the only value of the standalone step is an early failure
          # signal when a migration is broken.
          ALEMBIC_SCOPE=""
          if echo "$CHANGED" | grep -q '^backend/alembic/'; then
            ALEMBIC_SCOPE="alembic/"
            echo "alembic_changed=true" >> $GITHUB_OUTPUT
            echo "Alembic changes detected — including migration tests"
          else
            echo "alembic_changed=false" >> $GITHUB_OUTPUT
          fi

          NON_ALEMBIC=$(echo "$CHANGED" | grep -v '^backend/alembic/' || true)

          if [[ -z "$NON_ALEMBIC" ]]; then
            # Only alembic/ changes — skip the app/ test pass entirely.
            echo "scope=$ALEMBIC_SCOPE" >> $GITHUB_OUTPUT
            echo "Only alembic changes — running migration tests only"
            exit 0
          fi

          # Check if shared infra changed (requires full test run)
          if echo "$NON_ALEMBIC" | grep -qE '(app/testing/|app/models/|app/schemas/|app/core/|app/db/|conftest\.py)'; then
            echo "scope=app/ $ALEMBIC_SCOPE" >> $GITHUB_OUTPUT
            echo "Shared infrastructure changed — running all tests"
          else
            # Extract unique directories, strip backend/ prefix, and exclude non-code dirs
            DIRS=$(echo "$NON_ALEMBIC" | sed 's|^backend/||' | grep -v '^app/locales/' | xargs -I{} dirname {} | sort -u | tr '\n' ' ')
            if [[ -z "${DIRS// }" ]]; then
              echo "scope=app/ $ALEMBIC_SCOPE" >> $GITHUB_OUTPUT
              echo "Only non-code files changed — running all tests"
            else
              echo "scope=$DIRS$ALEMBIC_SCOPE" >> $GITHUB_OUTPUT
              echo "Running tests in: $DIRS$ALEMBIC_SCOPE"
            fi
          fi

      - name: Install uv
        if: steps.changes.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.21"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        if: steps.changes.outputs.skip != 'true'
        run: |
          cd backend
          uv sync --frozen

      - name: Run Alembic migrations
        # conftest.py auto-applies migrations before tests run, so this
        # explicit step is only valuable as an early-fail signal on PRs
        # that actually touch alembic/.
        if: steps.changes.outputs.skip != 'true' && steps.changes.outputs.alembic_changed == 'true'
        run: |
          cd backend
          uv run alembic upgrade head
          
          
      - name: Lint with Ruff
        if: steps.changes.outputs.skip != 'true'
        run: |
          cd backend
          uv run ruff check app

      - name: Check formatting with Ruff
        if: steps.changes.outputs.skip != 'true'
        run: |
          cd backend
          uv run ruff format --check app

      - name: Type-check with ty
        # Scoped gate: only ty's `invalid-return-type` rule is enforced (every
        # other rule is ignored), mirroring the old Pyright `reportReturnType`
        # gate — fails on return-type regressions without drowning in the
        # SQLModel/ORM-expression false positives ty reports by default.
        if: steps.changes.outputs.skip != 'true'
        run: |
          cd backend
          uv run ty check app --ignore all --error invalid-return-type


      - name: Run tests
        if: steps.changes.outputs.skip != 'true'
        run: |
          cd backend
          uv run python -m pytest ${{ steps.changes.outputs.scope }} -v --tb=short

  frontend-lint-and-test:
    name: Frontend Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for frontend changes
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- frontend/ || true)
          else
            CHANGED=$(git diff --name-only HEAD~1...HEAD -- frontend/ || true)
          fi
          if [[ -z "$CHANGED" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No frontend changes — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Frontend changes detected"
          fi

      - name: Set up Node.js
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        if: steps.filter.outputs.skip != 'true'
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Install dependencies
        if: steps.filter.outputs.skip != 'true'
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Lint
        if: steps.filter.outputs.skip != 'true'
        run: |
          cd frontend
          pnpm lint

      - name: TypeScript Check
        if: steps.filter.outputs.skip != 'true'
        run: |
          cd frontend
          pnpm typecheck

      - name: Run tests
        if: steps.filter.outputs.skip != 'true'
        run: |
          cd frontend
          pnpm test:run

  check-generated-types:
    name: Check Generated Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for backend or orval changes
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- backend/ frontend/orval.config.ts frontend/src/api/mutator.ts frontend/package.json || true)
          else
            CHANGED=$(git diff --name-only HEAD~1...HEAD -- backend/ frontend/orval.config.ts frontend/src/api/mutator.ts frontend/package.json || true)
          fi
          if [[ -z "$CHANGED" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No backend or codegen config changes — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Backend or codegen config changes detected"
          fi

      - name: Install uv
        if: steps.filter.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.21"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        if: steps.filter.outputs.skip != 'true'
        run: |
          cd backend
          uv sync --frozen --no-dev

      - name: Export OpenAPI spec
        if: steps.filter.outputs.skip != 'true'
        run: |
          cd backend
          uv run python scripts/export_openapi.py ../frontend/openapi.json

      - name: Set up Node.js
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        if: steps.filter.outputs.skip != 'true'
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Install frontend dependencies
        if: steps.filter.outputs.skip != 'true'
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Regenerate types
        if: steps.filter.outputs.skip != 'true'
        run: |
          cd frontend
          pnpm orval
          pnpm format:api

      - name: Check for drift
        if: steps.filter.outputs.skip != 'true'
        run: |
          if ! git diff --exit-code frontend/src/api/generated/; then
            echo ""
            echo "ERROR: Generated types are out of date!"
            echo "Run 'pnpm generate:api' in the frontend directory and commit the results."
            echo ""
            exit 1
          fi
          echo "Generated types are up to date."
