; CI PgBouncer config — the executable reference for transaction-mode pooling
; in front of Initiative (see history/transaction-scoped-context-design.md §4).
;
; The backend CI suite runs its app_user/app_admin traffic through this
; pooler, so every commit proves request context is transaction-local: any
; reintroduction of session-level SET ROLE/GUC/search_path state fails CI.
; Infra deployments copy the semantics that matter here:
;   - pool_mode = transaction
;   - max_prepared_statements set (requires PgBouncer >= 1.21; asyncpg keeps
;     its normal prepared-statement cache — no app-side pooler mode exists)
; Auth is environmental (CI uses a throwaway userlist; production uses its
; own auth story). Migrations/provisioning (DATABASE_URL) never go through
; the pooler — direct to Postgres, as in production.

[databases]
; Wildcard passthrough: pytest-xdist provisions one database per worker
; (initiative_test_gwN); all of them route to the same server.
* = host=127.0.0.1 port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_prepared_statements = 500
max_client_conn = 500
default_pool_size = 50
ignore_startup_parameters = extra_float_digits
